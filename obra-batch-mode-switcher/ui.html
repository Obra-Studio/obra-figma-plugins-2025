<!DOCTYPE html>
<html>
<head>
  <style>
    :root {
      --color-bg: #fff;
      --color-text: #333;
      --color-text-strong: #1a1a1a;
      --color-text-muted: #666;
      --color-text-subtle: #555;
      --color-surface: #f5f5f5;
      --color-border: #e5e5e5;
      --color-badge: #e8e8e8;
      --color-btn-secondary-bg: #e8e8e8;
      --color-btn-secondary-bg-hover: #ddd;
      --color-btn-secondary-text: #333;
      --color-clear-bg: #fef5f4;
      --color-clear-border: #f5d3cf;
      --color-clear-text: #e74c3c;
      --color-clear-bg-hover: #fde8e5;
      --color-clear-border-hover: #e74c3c;
      --color-clear-disabled: #999;
      --color-refresh-bg: #f5f5f5;
      --color-refresh-border: #e5e5e5;
      --color-refresh-text: #333;
      --color-refresh-bg-hover: #eee;
      --color-flash: #d4edda;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-bg: #2c2c2c;
        --color-text: #e0e0e0;
        --color-text-strong: #f0f0f0;
        --color-text-muted: #999;
        --color-text-subtle: #aaa;
        --color-surface: #383838;
        --color-border: #444;
        --color-badge: #444;
        --color-btn-secondary-bg: #444;
        --color-btn-secondary-bg-hover: #505050;
        --color-btn-secondary-text: #e0e0e0;
        --color-clear-bg: #3a2a2a;
        --color-clear-border: #5a3a3a;
        --color-clear-text: #f07068;
        --color-clear-bg-hover: #3e2e2e;
        --color-clear-border-hover: #f07068;
        --color-clear-disabled: #666;
        --color-refresh-bg: #383838;
        --color-refresh-border: #444;
        --color-refresh-text: #e0e0e0;
        --color-refresh-bg-hover: #444;
        --color-flash: #2a4a2e;
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 12px;
      color: var(--color-text);
      padding: 12px;
      background: var(--color-bg);
    }

    .header {
      margin-bottom: 16px;
    }

    h1 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--color-text-strong);
    }

    .subtitle {
      color: var(--color-text-muted);
      font-size: 11px;
      line-height: 1.4;
    }

    .selection-info {
      background: var(--color-surface);
      padding: 10px 12px;
      margin-bottom: 16px;
      font-size: 11px;
      color: var(--color-text-subtle);
    }

    .selection-info strong {
      color: var(--color-text);
    }

    .divider {
      height: 1px;
      background: var(--color-border);
      margin: 16px -12px;
    }

    .modes-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .mode-card {
      padding: 12px 0;
      border-bottom: 1px solid var(--color-border);
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .mode-card:last-child {
      border-bottom: none;
    }

    .mode-info {
      flex: 1;
      min-width: 0;
    }

    .mode-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .mode-name {
      font-weight: 600;
      font-size: 13px;
      color: var(--color-text-strong);
    }

    .mode-count {
      background: var(--color-badge);
      color: var(--color-text-subtle);
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 500;
      white-space: nowrap;
    }

    .collections-list {
      font-size: 11px;
      color: var(--color-text-muted);
      line-height: 1.5;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .mode-actions {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex-shrink: 0;
      min-width: 120px;
    }

    .btn {
      flex: 1;
      padding: 6px 10px;
      border: none;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: #18a0fb;
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      background: #0d8de5;
    }

    .btn-secondary {
      background: var(--color-btn-secondary-bg);
      color: var(--color-btn-secondary-text);
    }

    .btn-secondary:hover:not(:disabled) {
      background: var(--color-btn-secondary-bg-hover);
    }

    .empty-state {
      text-align: center;
      padding: 32px 16px;
      color: var(--color-text-muted);
    }

    .empty-state-icon {
      font-size: 32px;
      margin-bottom: 12px;
      opacity: 0.5;
    }

    .empty-state h2 {
      font-size: 13px;
      font-weight: 600;
      color: var(--color-text);
      margin-bottom: 8px;
    }

    .empty-state p {
      font-size: 11px;
      line-height: 1.5;
      max-width: 240px;
      margin: 0 auto;
    }

    .clear-section {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid var(--color-border);
    }

    .clear-label {
      font-size: 11px;
      color: var(--color-text-muted);
      margin-bottom: 8px;
      font-weight: 500;
    }

    .clear-actions {
      display: flex;
      gap: 6px;
    }

    .clear-btn {
      flex: 1;
      padding: 6px 10px;
      background: var(--color-clear-bg);
      border: 1px solid var(--color-clear-border);
      border-radius: 3px;
      font-size: 11px;
      font-weight: 500;
      color: var(--color-clear-text);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .clear-btn:hover:not(:disabled) {
      background: var(--color-clear-bg-hover);
      border-color: var(--color-clear-border-hover);
    }

    .clear-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      color: var(--color-clear-disabled);
    }

    .footer {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid var(--color-border);
    }

    .refresh-btn {
      width: 100%;
      padding: 8px;
      background: var(--color-refresh-bg);
      border: 1px solid var(--color-refresh-border);
      border-radius: 3px;
      font-size: 11px;
      font-weight: 500;
      color: var(--color-refresh-text);
      cursor: pointer;
      transition: background 0.15s;
    }

    .refresh-btn:hover {
      background: var(--color-refresh-bg-hover);
    }

    .loading {
      text-align: center;
      padding: 32px;
      color: var(--color-text-muted);
    }

    .success-flash {
      animation: flash 0.3s ease-out;
    }

    @keyframes flash {
      0% { background-color: var(--color-flash); }
      100% { background-color: transparent; }
    }
  </style>
</head>
<body>
  <div class="header">
    <p class="subtitle">Apply same-named modes across all collections at once</p>
  </div>
  
  <div class="selection-info" id="selection-info">
    <span id="selection-text">Scanning...</span>
  </div>
  
  <div id="content">
    <div class="loading">Scanning variable collections...</div>
  </div>

  <div class="clear-section">
    <div class="clear-label">Clear all mode overrides</div>
    <div class="clear-actions">
      <button class="clear-btn" id="clear-selection-btn">Clear Selection</button>
      <button class="clear-btn" id="clear-page-btn">Clear Page</button>
    </div>
  </div>

  <div class="footer">
    <button class="refresh-btn" id="refresh-btn">Rescan Collections</button>
  </div>

  <script>
    let sharedModes = [];
    let selectionInfo = { totalSelected: 0, validNodes: 0, pageFrameCount: 0 };
    
    // Update selection info display
    function updateSelectionInfo() {
      const el = document.getElementById('selection-text');

      if (selectionInfo.validNodes > 0) {
        el.innerHTML = `<strong>${selectionInfo.validNodes}</strong> frame${selectionInfo.validNodes !== 1 ? 's' : ''} selected`;
      } else {
        el.innerHTML = `No frames selected`;
      }

      // Update clear button states
      const clearSelectionBtn = document.getElementById('clear-selection-btn');
      if (clearSelectionBtn) {
        clearSelectionBtn.disabled = selectionInfo.validNodes === 0;
      }
    }
    
    // Render the modes list
    function render() {
      const content = document.getElementById('content');
      
      if (sharedModes.length === 0) {
        content.innerHTML = `
          <div class="empty-state">

            <h2>No shared modes found</h2>
            <p>Create modes with the same name in multiple variable collections to use this plugin.</p>
          </div>
        `;
        return;
      }
      
      const modesHTML = sharedModes.map((mode, index) => {
        const collections = mode.modes.map(m => m.collectionName).join(', ');
        const hasSelection = selectionInfo.validNodes > 0;

        return `
          <div class="mode-card" id="mode-card-${index}">
            <div class="mode-info">
              <div class="mode-header">
                <span class="mode-name">${escapeHtml(mode.name)}</span>
                <span class="mode-count">${mode.count} collections</span>
              </div>
              <div class="collections-list">${escapeHtml(collections)}</div>
            </div>
            <div class="mode-actions">
              <button class="btn btn-secondary"
                      onclick="applyMode(${index}, 'selection')"
                      ${!hasSelection ? 'disabled' : ''}>
                Selection
              </button>
              <button class="btn btn-secondary"
                      onclick="applyMode(${index}, 'page')">
                Page
              </button>
            </div>
          </div>
        `;
      }).join('');
      
      content.innerHTML = `<div class="modes-list">${modesHTML}</div>`;
    }
    
    // Escape HTML to prevent XSS
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    // Apply a mode
    function applyMode(index, applyTo) {
      const mode = sharedModes[index];
      
      parent.postMessage({
        pluginMessage: {
          type: 'apply-mode',
          sharedMode: mode,
          applyTo: applyTo
        }
      }, '*');
      
      // Visual feedback
      const card = document.getElementById(`mode-card-${index}`);
      if (card) {
        card.classList.remove('success-flash');
        void card.offsetWidth; // Trigger reflow
        card.classList.add('success-flash');
      }
    }
    
    // Clear modes
    function clearModes(clearFrom) {
      parent.postMessage({
        pluginMessage: {
          type: 'clear-modes',
          clearFrom: clearFrom
        }
      }, '*');
    }

    // Clear button handlers
    document.getElementById('clear-selection-btn').addEventListener('click', () => {
      clearModes('selection');
    });

    document.getElementById('clear-page-btn').addEventListener('click', () => {
      clearModes('page');
    });

    // Refresh button handler
    document.getElementById('refresh-btn').addEventListener('click', () => {
      document.getElementById('content').innerHTML = '<div class="loading">Scanning variable collections...</div>';
      parent.postMessage({ pluginMessage: { type: 'scan' } }, '*');
    });
    
    // Handle messages from plugin
    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      
      if (msg.type === 'scan-result') {
        // Filter out modes named "Mode 1"
        sharedModes = msg.sharedModes.filter(mode => mode.name !== 'Mode 1');
        selectionInfo = msg.selectionInfo;
        updateSelectionInfo();
        render();
      }

      if (msg.type === 'selection-info') {
        selectionInfo = msg.selectionInfo;
        updateSelectionInfo();
        render(); // Re-render to update button states
      }

      if (msg.type === 'apply-result') {
        // Could show additional feedback here if needed
      }

      if (msg.type === 'clear-result') {
        // Notification is already shown from plugin code
      }
    };

    // Auto-resize plugin height to match content
    function syncHeight() {
      const height = document.body.scrollHeight;
      parent.postMessage({ pluginMessage: { type: 'resize', height } }, '*');
    }

    const observer = new MutationObserver(syncHeight);
    observer.observe(document.body, { childList: true, subtree: true, attributes: true });
    syncHeight();
  </script>
</body>
</html>
