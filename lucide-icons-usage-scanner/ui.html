<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 16px;
      background: #ffffff;
    }

    h2 {
      font-size: 14px;
      font-weight: 600;
      color: #0c0d0f;
      margin: 0 0 8px 0;
    }

    .subtitle {
      font-size: 12px;
      color: #666;
      margin: 0 0 16px 0;
    }

    .stats {
      background: #f5f5f5;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
    }

    .stat-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 13px;
    }

    .stat-item:last-child {
      margin-bottom: 0;
    }

    .stat-label {
      color: #5c5c5c;
    }

    .stat-value {
      font-weight: 600;
      color: #0c0d0f;
    }

    .scan-button {
      width: 100%;
      padding: 10px;
      background: #f56040;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 16px;
      transition: background 0.2s;
    }

    .scan-button:hover {
      background: #e04520;
    }

    .scan-button:disabled {
      background: #c4c4c4;
      cursor: not-allowed;
    }

    .scan-button.secondary {
      background: #fff;
      color: #f56040;
      border: 1px solid #f56040;
      flex: 1;
      font-size: 12px;
      padding: 8px;
    }

    .scan-button.secondary:hover {
      background: #fff8f5;
    }

    .scan-button.secondary:disabled {
      background: #f5f5f5;
      color: #c4c4c4;
      border-color: #c4c4c4;
    }

    .results {
      max-height: 400px;
      overflow-y: auto;
    }

    .result-item {
      background: #f5f5f5;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 8px;
      font-size: 12px;
    }

    .result-name {
      font-weight: 600;
      color: #0c0d0f;
      margin-bottom: 4px;
      word-break: break-word;
    }

    .result-type {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 500;
      margin-right: 8px;
      text-transform: uppercase;
    }

    .type-component {
      background: #e3f2fd;
      color: #1976d2;
    }

    .type-instance {
      background: #fff3e0;
      color: #f56040;
    }

    .result-id {
      color: #8c8c8c;
      font-size: 11px;
      margin-top: 4px;
      font-family: monospace;
    }

    .result-size {
      color: #8c8c8c;
      font-size: 11px;
      margin-top: 2px;
    }

    .matched-icon {
      display: inline-block;
      font-size: 11px;
      color: #f56040;
      font-weight: 500;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #8c8c8c;
      font-size: 13px;
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: #5c5c5c;
      font-size: 13px;
    }

    .progress-container {
      margin-top: 12px;
    }

    .progress-bar-bg {
      width: 100%;
      height: 8px;
      background: #e0e0e0;
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #f56040, #ff8a65);
      border-radius: 4px;
      transition: width 0.2s ease;
      width: 0%;
    }

    .progress-text {
      margin-top: 8px;
      font-size: 11px;
      color: #666;
    }

    .progress-page {
      font-weight: 500;
      color: #333;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 280px;
      margin: 0 auto;
    }

    .progress-stats {
      margin-top: 4px;
      color: #888;
    }

    .pulse {
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .section-header {
      font-size: 13px;
      font-weight: 600;
      color: #0c0d0f;
      margin: 20px 0 0 0;
      padding: 12px;
      background: #f8f8f8;
      border-radius: 6px;
      cursor: pointer;
      user-select: none;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid #e0e0e0;
    }

    .section-header:hover {
      background: #f0f0f0;
    }

    .section-content {
      padding: 12px;
      border: 1px solid #e0e0e0;
      border-top: none;
      border-radius: 0 0 6px 6px;
      margin-bottom: 12px;
    }

    .section-content.collapsed {
      display: none;
    }

    .chevron {
      font-size: 12px;
      transition: transform 0.2s;
    }

    .chevron.expanded {
      transform: rotate(90deg);
    }

    .count-item {
      background: #f5f5f5;
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 6px;
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .count-name {
      font-weight: 500;
      color: #0c0d0f;
    }

    .count-badge {
      background: #f56040;
      color: white;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      min-width: 20px;
      text-align: center;
    }

    .info-box {
      background: #fff8f5;
      border: 1px solid #f56040;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 16px;
      font-size: 12px;
      color: #333;
    }

    .info-box strong {
      color: #f56040;
    }
  </style>
</head>
<body>
  <h2>Lucide Icons Usage Scanner</h2>
  <p class="subtitle">Scans for <span id="totalIcons">1651</span> Lucide icons in your file</p>

  <div class="info-box">
    <strong>Detection:</strong> Finds layers matching Lucide icon names. Supports prefixes like "Icon / mail", "Icons/chevron-down", "Lucide / user", etc.
  </div>

  <div class="stats">
    <div class="stat-item">
      <span class="stat-label">Components found:</span>
      <span class="stat-value" id="componentCount">0</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">Instances found:</span>
      <span class="stat-value" id="instanceCount">0</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">Unique icons used:</span>
      <span class="stat-value" id="uniqueCount">0</span>
    </div>
  </div>

  <button class="scan-button" id="scanButton" onclick="scanFile('all')">
    Scan Entire File
  </button>

  <div style="display: flex; gap: 8px; margin-bottom: 16px;">
    <button class="scan-button secondary" id="scanPageButton" onclick="scanFile('page')" style="margin-bottom: 0;">
      Current Page Only
    </button>
    <button class="scan-button secondary" id="scanSelectionButton" onclick="scanFile('selection')" style="margin-bottom: 0;">
      Selection Only
    </button>
  </div>

  <div id="results" class="results"></div>

  <script>
    var components = [];
    var instances = [];
    var instanceCounts = {};

    function scanFile(scope) {
      var scanButton = document.getElementById('scanButton');
      var scanPageButton = document.getElementById('scanPageButton');
      var scanSelectionButton = document.getElementById('scanSelectionButton');
      var resultsDiv = document.getElementById('results');

      // Disable all buttons
      scanButton.disabled = true;
      scanPageButton.disabled = true;
      scanSelectionButton.disabled = true;
      scanButton.textContent = 'Scanning...';

      var scopeText = scope === 'page' ? 'current page' : (scope === 'selection' ? 'selection' : 'entire file');

      resultsDiv.innerHTML = '<div class="loading">' +
        '<div class="pulse">Scanning ' + scopeText + ' for Lucide icons...</div>' +
        '<div class="progress-container">' +
          '<div class="progress-bar-bg"><div class="progress-bar-fill" id="progressBar"></div></div>' +
          '<div class="progress-text">' +
            '<div class="progress-page" id="progressPage">Initializing...</div>' +
            '<div class="progress-stats" id="progressStats"></div>' +
          '</div>' +
        '</div>' +
      '</div>';

      components = [];
      instances = [];
      instanceCounts = {};

      parent.postMessage({
        pluginMessage: {
          type: 'scan-file',
          scope: scope || 'all'
        }
      }, '*');
    }

    function displayResults() {
      var resultsDiv = document.getElementById('results');
      var componentCount = document.getElementById('componentCount');
      var instanceCount = document.getElementById('instanceCount');
      var uniqueCount = document.getElementById('uniqueCount');

      componentCount.textContent = components.length;
      instanceCount.textContent = instances.length;
      uniqueCount.textContent = Object.keys(instanceCounts).length;

      if (components.length === 0 && instances.length === 0) {
        resultsDiv.innerHTML = '<div class="empty-state">No Lucide icons found.<br><br><small>Icons are detected by matching layer names against 1651 official Lucide icon names.</small></div>';
        return;
      }

      var html = '';

      // Display instance counts section (TOP PRIORITY)
      var countKeys = Object.keys(instanceCounts).sort();
      if (countKeys.length > 0) {
        html += '<div class="section-header" onclick="toggleSection(\'usage\')">';
        html += '<span>Icon Usage Summary (' + countKeys.length + ' unique)</span>';
        html += '<span class="chevron expanded">▶</span>';
        html += '</div>';
        html += '<div class="section-content" id="usage-content">';
        for (var k = 0; k < countKeys.length; k++) {
          var componentName = countKeys[k];
          var count = instanceCounts[componentName];
          html += '<div class="count-item">';
          html += '<span class="count-name">' + escapeHtml(componentName) + '</span>';
          html += '<span class="count-badge">' + count + '</span>';
          html += '</div>';
        }
        html += '</div>';
      }

      // Display detailed results section (SECONDARY)
      var hasDetailedResults = components.length > 0 || instances.length > 0;
      if (hasDetailedResults) {
        html += '<div class="section-header" onclick="toggleSection(\'details\')">';
        html += '<span>All Instances (' + (components.length + instances.length) + ')</span>';
        html += '<span class="chevron">▶</span>';
        html += '</div>';
        html += '<div class="section-content collapsed" id="details-content">';

        // Components subsection
        if (components.length > 0) {
          html += '<div style="font-weight: 600; margin-bottom: 8px; font-size: 12px; color: #666;">Components (' + components.length + ')</div>';
          for (var i = 0; i < components.length; i++) {
            var component = components[i];
            html += '<div class="result-item">';
            html += '<div class="result-name">' + escapeHtml(component.name) + '</div>';
            html += '<span class="result-type type-component">Component</span>';
            if (component.matchedIcon) {
              html += '<span class="matched-icon">→ ' + escapeHtml(component.matchedIcon) + '</span>';
            }
            if (component.width && component.height) {
              html += '<div class="result-size">' + Math.round(component.width) + '×' + Math.round(component.height) + 'px</div>';
            }
            html += '</div>';
          }
        }

        // Instances subsection
        if (instances.length > 0) {
          if (components.length > 0) html += '<div style="height: 12px;"></div>';
          html += '<div style="font-weight: 600; margin-bottom: 8px; font-size: 12px; color: #666;">Instances (' + instances.length + ')</div>';
          for (var j = 0; j < instances.length; j++) {
            var instance = instances[j];
            html += '<div class="result-item">';
            html += '<div class="result-name">' + escapeHtml(instance.name) + '</div>';
            html += '<span class="result-type type-instance">Instance</span>';
            if (instance.matchedIcon) {
              html += '<span class="matched-icon">→ ' + escapeHtml(instance.matchedIcon) + '</span>';
            }
            if (instance.width && instance.height) {
              html += '<div class="result-size">' + Math.round(instance.width) + '×' + Math.round(instance.height) + 'px</div>';
            }
            html += '</div>';
          }
        }

        html += '</div>';
      }

      resultsDiv.innerHTML = html;
    }

    function escapeHtml(text) {
      var div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function toggleSection(sectionId) {
      var content = document.getElementById(sectionId + '-content');
      var chevron = document.querySelector('[onclick="toggleSection(\'' + sectionId + '\')"] .chevron');

      if (content.classList.contains('collapsed')) {
        content.classList.remove('collapsed');
        chevron.classList.add('expanded');
      } else {
        content.classList.add('collapsed');
        chevron.classList.remove('expanded');
      }
    }

    function updateProgress(message, current, total, foundSoFar) {
      var progressBar = document.getElementById('progressBar');
      var progressPage = document.getElementById('progressPage');
      var progressStats = document.getElementById('progressStats');

      if (progressBar && progressPage) {
        var percent = total > 0 ? Math.round((current / total) * 100) : 0;
        progressBar.style.width = percent + '%';
        progressPage.textContent = message;
        if (typeof foundSoFar === 'number') {
          progressStats.textContent = 'Page ' + current + ' of ' + total + ' • Found ' + foundSoFar + ' icons so far';
        } else {
          progressStats.textContent = 'Page ' + current + ' of ' + total;
        }
      }
    }

    // Listen for messages from plugin
    window.onmessage = function(event) {
      var msg = event.data.pluginMessage;

      if (msg.type === 'scan-progress') {
        updateProgress(msg.message, msg.current, msg.total, msg.foundSoFar);
      }

      if (msg.type === 'scan-complete') {
        components = msg.components || [];
        instances = msg.instances || [];
        instanceCounts = msg.instanceCounts || {};

        // Update total icons count if provided
        if (msg.totalLucideIcons) {
          document.getElementById('totalIcons').textContent = msg.totalLucideIcons;
        }

        // Handle error message (e.g., no selection)
        if (msg.error) {
          document.getElementById('results').innerHTML = '<div class="empty-state" style="color: #f56040;">' + msg.error + '</div>';
        } else {
          displayResults();
        }

        // Re-enable all buttons
        var scanButton = document.getElementById('scanButton');
        var scanPageButton = document.getElementById('scanPageButton');
        var scanSelectionButton = document.getElementById('scanSelectionButton');
        scanButton.disabled = false;
        scanPageButton.disabled = false;
        scanSelectionButton.disabled = false;
        scanButton.textContent = 'Scan Entire File';
      }
    };
  </script>
</body>
</html>
